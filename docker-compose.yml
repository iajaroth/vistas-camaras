# Local dev stack: PostgreSQL + Django API + Next.js web.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vistas_camaras}
      POSTGRES_USER: ${POSTGRES_USER:-vistas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vistas}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vistas}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DATABASE_URL: postgres://${POSTGRES_USER:-vistas}:${POSTGRES_PASSWORD:-vistas}@db:5432/${POSTGRES_DB:-vistas_camaras}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media:/app/media
    ports:
      - "8000:8000"

  web:
    build: ./frontend
    env_file: .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  pgdata:
  media:
